<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disease Detector | AI Symptom Checker</title>
  
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/static/home.js" defer></script>
</head>
<body>

  <div class="sidebar" id="sidebar">
    <button id="close-btn" class="icon-btn"><i class="fas fa-times"></i></button>
    <nav>
      <a href="home.html"><i class="fas fa-home"></i> Home</a>
      <a href="#"><i class="fas fa-cogs"></i> How it works</a>
      <a href="#"><i class="fas fa-info-circle"></i> About us</a>
    </nav>
  </div>

  <header>
    <button id="menu-btn" class="icon-btn"><i class="fas fa-bars"></i></button>
    <span class="logo-text">Disease Detector 🩺</span>
  </header>

  <main class="container">
    
    <section class="panel glass">
      <h1>Symptom Analysis</h1>
      <p class="subtitle">Input data parameters below.</p>
      
      <form id="symptomForm">
        <div class="input-group">
          <textarea 
            id="symptoms" 
            name="symptoms" 
            placeholder="Initialize sequence... E.g., severe headache, mild fever, fatigue for 3 days." 
            required></textarea>
        </div>
        <button type="submit" class="action-btn">Execute Analysis</button>
      </form>
    </section>

    <section class="panel glass output-panel">
      
      <div id="idleState" class="status-view active">
        <i class="fas fa-microchip"></i>
        <p>Awaiting system input...</p>
      </div>

      <div id="loadingDiv" class="status-view">
        <div class="spinner"></div>
        <p>Processing neural pathways...</p>
      </div>

      <div id="resultBox" class="result-box">
        <h3>System Diagnosis</h3>
        <div id="predictionContent"></div>
        <p class="disclaimer">
          <em>Disclaimer: Algorithmic output only. Consult a human physician.</em>
        </p>
      </div>
      
    </section>

  </main>
</body>
</html>
